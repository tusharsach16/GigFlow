services:
  # ---------- MongoDB ----------
  mongo:
    image: mongo:7
    container_name: gigflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------- Backend API ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigflow-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/gigflow
      - JWT_SECRET=${JWT_SECRET:-dev_secret_change_in_production}
      - JWT_EXPIRE=1d
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:80
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5000/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------- Frontend (nginx) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
        - VITE_SOCKET_URL=http://localhost:5000
    container_name: gigflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
